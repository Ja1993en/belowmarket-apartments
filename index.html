<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/favicon-192.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#173f3f" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (() => {
        const reloadKey = "bmaInitialAssetReloadedV3";
        const reloadWindowMs = 15000;
        const staleAssetPatterns = [
          "Expected a JavaScript-or-Wasm module script",
          "Failed to load module script",
          "Failed to fetch dynamically imported module",
          "Importing a module script failed",
          "Refused to apply style",
          "not a supported stylesheet MIME type",
          "MIME type",
        ];
        const memoryFlags = new Set();

        function getSessionFlag(key) {
          try {
            const storedValue = sessionStorage.getItem(key);
            const storedTime = Number(storedValue);

            return (
              memoryFlags.has(key) ||
              storedValue === "true" ||
              (Number.isFinite(storedTime) && Date.now() - storedTime < reloadWindowMs)
            );
          } catch {
            return memoryFlags.has(key);
          }
        }

        function setSessionFlag(key) {
          memoryFlags.add(key);

          try {
            sessionStorage.setItem(key, String(Date.now()));
          } catch {
            // Some iPhone Safari privacy modes block session storage.
          }
        }

        function removeSessionFlag(key) {
          memoryFlags.delete(key);

          try {
            sessionStorage.removeItem(key);
          } catch {
            // Some iPhone Safari privacy modes block session storage.
          }
        }

        function getErrorText(event) {
          return [
            event?.message,
            event?.reason?.message,
            event?.reason,
            event?.target?.src,
            event?.target?.href,
          ]
            .filter(Boolean)
            .join(" ");
        }

        function isStaleAssetError(event) {
          const errorText = getErrorText(event);
          const failedSource = event?.target?.src || event?.target?.href || "";

          return (
            failedSource.includes("/assets/") ||
            staleAssetPatterns.some((pattern) => errorText.includes(pattern))
          );
        }

        async function clearOldCaches() {
          try {
            if ("caches" in window) {
              const cacheNames = await window.caches.keys();
              await Promise.all(cacheNames.map((cacheName) => window.caches.delete(cacheName)));
            }
          } catch {
            // Reload still fixes normal stale deployment cases if cache cleanup is blocked.
          }

          try {
            if ("serviceWorker" in navigator) {
              const registrations = await navigator.serviceWorker.getRegistrations();
              await Promise.all(registrations.map((registration) => registration.unregister()));
            }
          } catch {
            // Ignore service worker cleanup failures and continue with the reload.
          }
        }

        async function reloadForFreshAssets(event) {
          if (!isStaleAssetError(event)) return;
          if (getSessionFlag(reloadKey)) return;

          setSessionFlag(reloadKey);
          await clearOldCaches();
          window.location.reload();
        }

        window.addEventListener("error", reloadForFreshAssets, true);
        window.addEventListener("unhandledrejection", reloadForFreshAssets);
        window.addEventListener("load", () => {
          window.setTimeout(() => removeSessionFlag(reloadKey), 4000);
        });
      })();
    </script>
    <title>Below Market Apartments</title>
    <meta
      name="description"
      content="Find the best apartment deals near you."
    />
    <link rel="canonical" href="https://belowmarketapartments.com/" />

    <!-- bma-og-end -->
